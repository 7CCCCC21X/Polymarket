<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>Polymarket 数据批量查询</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<style>
:root{
  --c-primary:#6366f1;--c-primary-dark:#4f46e5;--c-primary-light:#a5b4fc;
  --c-bg:#f8fafc;--c-card:#fff;--c-border:#e2e8f0;
  --c-text:#1e293b;--c-sub:#64748b;--c-green:#10b981;--c-red:#ef4444;
  --c-hover:rgba(99,102,241,.06);--c-even:#f8fafc;
  --c-input-bg:#fff;--c-summary-bg:#eef2ff;--c-tooltip:#334155;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,.08);
}

/* 暗色模式 */
[data-theme="dark"]{
  --c-primary:#818cf8;--c-primary-dark:#6366f1;--c-primary-light:#4f46e5;
  --c-bg:#0f172a;--c-card:#1e293b;--c-border:#334155;
  --c-text:#e2e8f0;--c-sub:#94a3b8;--c-green:#34d399;--c-red:#f87171;
  --c-hover:rgba(129,140,248,.08);--c-even:#1e293b;
  --c-input-bg:#0f172a;--c-summary-bg:#1e1b4b;--c-tooltip:#475569;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Helvetica Neue',Arial,sans-serif;background:var(--c-bg);color:var(--c-text);line-height:1.6;padding:32px 24px;transition:background .3s,color .3s;min-height:100vh}

/* 页头 */
.page-header{text-align:center;margin-bottom:28px}
.page-header h1{font-size:30px;font-weight:800;color:var(--c-text);letter-spacing:-.5px;margin-bottom:6px}
.page-header h1 span{background:linear-gradient(135deg,var(--c-primary),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-header .subtitle{font-size:15px;color:var(--c-sub);margin-bottom:0}

.desc{max-width:780px;margin:0 auto 20px;text-align:center;font-size:14px;color:var(--c-sub)}
.note{text-align:center;font-size:13px;font-weight:600;color:var(--c-red);margin:4px 0 12px;padding:6px 12px;background:rgba(239,68,68,.06);border-radius:6px;display:inline-block}

.card{max-width:1200px;margin:0 auto 24px;background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;transition:background .3s,border-color .3s}
textarea{width:100%;min-height:120px;resize:vertical;padding:12px 14px;border:1px solid var(--c-border);border-radius:8px;background:var(--c-input-bg);color:var(--c-text);font-family:inherit;font-size:14px;transition:background .3s,border-color .3s,color .3s,box-shadow .2s}
textarea:focus{outline:none;border-color:var(--c-primary);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
textarea.drag-over{border-color:var(--c-primary);background:var(--c-summary-bg)}

/* 按钮 */
button{padding:10px 20px;font-size:14px;font-weight:600;border:none;border-radius:8px;background:var(--c-primary);color:#fff;margin:4px;cursor:pointer;transition:all .2s;letter-spacing:.2px}
button:hover:not(:disabled){background:var(--c-primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,.25)}
button:active:not(:disabled){transform:translateY(0)}
button:disabled{background:#94a3b8;cursor:not-allowed;opacity:.6}
.btn-stop{background:var(--c-red)}
.btn-stop:hover:not(:disabled){background:#dc2626;box-shadow:0 4px 12px rgba(239,68,68,.25)}
.btn-sm{padding:5px 10px;font-size:12px;margin:0;font-weight:500;border-radius:6px}
.btn-outline{background:transparent;color:var(--c-primary);border:1px solid var(--c-border)}
.btn-outline:hover:not(:disabled){background:var(--c-hover);box-shadow:none;transform:none}
.center{text-align:center}
.toolbar{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-top:10px}

/* 主题切换 */
.theme-toggle{position:fixed;top:20px;right:20px;width:42px;height:42px;border-radius:50%;font-size:18px;padding:0;margin:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--c-card);color:var(--c-text);border:1px solid var(--c-border);box-shadow:var(--shadow)}
.theme-toggle:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}

/* 离线横幅 */
.offline-banner{display:none;position:fixed;top:0;left:0;right:0;background:var(--c-red);color:#fff;text-align:center;padding:10px;font-size:14px;z-index:200;font-weight:500}

/* 进度条 */
#loading{margin-top:16px;text-align:center;color:var(--c-sub);font-size:13px}
progress{width:100%;height:6px;border:none;border-radius:3px;background:var(--c-border);overflow:hidden}
progress::-webkit-progress-value{background:linear-gradient(90deg,var(--c-primary),#8b5cf6);border-radius:3px;transition:width .3s}
progress::-webkit-progress-bar{background:var(--c-border);border-radius:3px}

#summary{display:none;margin:18px 0 12px;padding:12px 16px;background:var(--c-summary-bg);border-left:4px solid var(--c-primary);
         border-radius:var(--radius);color:var(--c-primary);font-size:14px;font-weight:500;transition:background .3s}

/* 搜索过滤 */
.filter-row{display:flex;gap:8px;align-items:center;margin:14px 0;flex-wrap:wrap}
.filter-row input{flex:1;min-width:180px;padding:9px 14px;border:1px solid var(--c-border);border-radius:8px;font-size:14px;background:var(--c-input-bg);color:var(--c-text);transition:all .2s}
.filter-row input:focus{outline:none;border-color:var(--c-primary);box-shadow:0 0 0 3px rgba(99,102,241,.12)}

/* 列选择下拉 */
.col-toggle{position:relative;display:inline-block}
.col-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:var(--c-card);border:1px solid var(--c-border);border-radius:8px;padding:10px 12px;min-width:170px;z-index:10;box-shadow:var(--shadow-lg)}
.col-menu.show{display:block}
.col-menu label{display:flex;align-items:center;gap:6px;padding:5px 0;font-size:13px;cursor:pointer;white-space:nowrap;color:var(--c-text)}
.col-menu label:hover{color:var(--c-primary)}

/* 查询历史 */
.history-wrap{margin-top:10px}
.history-wrap details{font-size:13px;color:var(--c-sub)}
.history-wrap summary{cursor:pointer;color:var(--c-primary);user-select:none;font-weight:500}
.history-list{max-height:150px;overflow-y:auto;margin-top:6px}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--c-border)}
.history-item span{cursor:pointer;color:var(--c-text);font-size:12px}
.history-item span:hover{color:var(--c-primary)}
.history-item button{background:var(--c-red);color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer}

/* 表格样式 */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);border:1px solid var(--c-border);margin-top:4px}
table{width:100%;min-width:1000px;border-collapse:collapse;background:var(--c-card);transition:background .3s}
th,td{padding:12px 10px;font-size:13px;text-align:center;transition:background .3s,border-color .3s}
td{border-top:1px solid var(--c-border)}
th{background:var(--c-primary);color:#fff;position:sticky;top:0;z-index:2;cursor:pointer;user-select:none;white-space:nowrap;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px;padding:10px 8px}
th:hover{background:var(--c-primary-dark)}
th .sort-arrow{font-size:10px;margin-left:3px;opacity:.8}
th .sort-hint{font-size:9px;margin-left:2px;opacity:.4;transition:opacity .2s}
th:hover .sort-hint{opacity:.8}
tbody tr{transition:background .15s}
tbody tr:nth-child(even){background:var(--c-even)}
tbody tr:hover{background:var(--c-hover)}

/* 粘住列 */
thead th:nth-child(1){position:sticky;left:0;background:var(--c-primary);z-index:3}
thead th:nth-child(2){position:sticky;left:40px;background:var(--c-primary);z-index:3}
tbody td:nth-child(1){position:sticky;left:0;background:inherit;z-index:1}
tbody td:nth-child(2){position:sticky;left:40px;background:inherit;z-index:1}

/* 汇总行 */
tfoot td{background:var(--c-summary-bg);font-weight:700;border-top:2px solid var(--c-primary);color:var(--c-primary);font-size:13px}

/* 汇总卡片 */
.stats-cards{display:none;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}
.stat-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);padding:18px 16px;text-align:center;transition:all .2s;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--c-primary),#8b5cf6);opacity:0;transition:opacity .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-card:hover::before{opacity:1}
.stat-card .stat-label{font-size:12px;color:var(--c-sub);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.stat-card .stat-value{font-size:24px;font-weight:800;color:var(--c-text);letter-spacing:-.5px}
.stat-card .stat-value.positive{color:var(--c-green)}
.stat-card .stat-value.negative{color:var(--c-red)}
@media(max-width:640px){.stats-cards{grid-template-columns:repeat(2,1fr);gap:8px}.stat-card{padding:14px 10px}.stat-card .stat-value{font-size:18px}}

/* 状态色 */
.positive{color:var(--c-green);font-weight:600}
.negative{color:var(--c-red);font-weight:600}
.inactive{color:var(--c-red)}

/* 复制按钮 & Toast */
.copy{margin-left:4px;font-size:13px;color:var(--c-sub);cursor:pointer;transition:color .2s}
.copy:hover{color:var(--c-primary)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--c-tooltip);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.15)}

/* 备注输入框 */
.note-input{width:80px;padding:4px 8px;border:1px solid transparent;border-radius:6px;font-size:12px;background:transparent;color:var(--c-text);text-align:center;transition:all .2s}
.note-input:hover{border-color:var(--c-border);background:var(--c-input-bg)}
.note-input:focus{outline:none;border-color:var(--c-primary);background:var(--c-input-bg);width:120px;box-shadow:0 0 0 3px rgba(99,102,241,.12)}

/* 页脚 */
.footer{text-align:center;font-size:13px;color:var(--c-sub);margin-top:48px;padding-bottom:16px}
.footer a{color:var(--c-primary);text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}

/* 作者标签 */
.author-badge{display:inline-flex;align-items:center;gap:6px;background:var(--c-card);border:1px solid var(--c-border);border-radius:20px;padding:5px 16px 5px 12px;font-size:13px;font-weight:500;color:var(--c-text);text-decoration:none;margin-left:12px;vertical-align:middle;transition:all .2s}
.author-badge:hover{background:var(--c-hover);box-shadow:var(--shadow);border-color:var(--c-primary-light)}
.author-badge svg{width:15px;height:15px;fill:currentColor}

/* 移动端适配 */
@media(max-width:640px){
  body{padding:12px 10px}
  .page-header h1{font-size:22px}
  .page-header .subtitle{font-size:13px}
  .card{padding:16px}
  textarea{min-height:80px}
  button{padding:9px 14px;font-size:13px}
  th,td{padding:8px 6px;font-size:11px}
  .theme-toggle{top:10px;right:10px;width:36px;height:36px;font-size:16px}
  .filter-row{flex-direction:column}
  .filter-row input{width:100%}
  .toolbar{gap:4px}
  .author-badge{margin-left:0;margin-top:8px;display:flex}
}
</style>
</head>

<body>
<div id="offlineBanner" class="offline-banner">网络已断开，请检查连接后重试</div>

<button id="themeBtn" class="theme-toggle" title="切换暗色/亮色模式">🌙</button>

<div class="page-header">
  <h1><span>Polymarket</span> 数据批量查询 <a class="author-badge" href="https://x.com/0xXIAOc" target="_blank" title="关注作者推特"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>@0xXIAOc</a></h1>
  <p class="subtitle">粘贴地址（每行一个），或拖入 CSV / TXT 文件，支持并发查询与实时更新</p>
</div>

<div class="card">
  <textarea id="input" placeholder="每行粘贴一个地址，或将 CSV/TXT 文件拖拽到此处..."></textarea>
  <div class="center"><p class="note">提示：查询前请将 VPN 切换到「全局模式」</p></div>

  <div class="history-wrap" id="historyWrap" style="display:none">
    <details>
      <summary>查询历史</summary>
      <div class="history-list" id="historyList"></div>
      <div class="center" style="margin-top:6px"><button class="btn-sm btn-outline" id="clearHistory">清空历史</button></div>
    </details>
  </div>

  <div class="toolbar">
    <button id="run">开始查询</button>
    <button id="stop" class="btn-stop" style="display:none">停止</button>
    <button id="csv" class="btn-outline" disabled>导出 CSV</button>
    <button id="json" class="btn-outline" disabled>导出 JSON</button>
  </div>

  <div id="loading" style="display:none;"><progress id="bar" value="0" max="100"></progress><div id="barTxt"></div></div>
  <div id="summary"></div>

  <div class="stats-cards" id="statsCards">
    <div class="stat-card">
      <div class="stat-label">总盈亏</div>
      <div class="stat-value" id="statProfit">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">可用资金总额</div>
      <div class="stat-value" id="statAvail">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">持仓总额</div>
      <div class="stat-value" id="statHold">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">所有地址总余额</div>
      <div class="stat-value" id="statTotal">-</div>
    </div>
  </div>

  <div class="filter-row" id="filterRow" style="display:none">
    <input id="filterInput" type="text" placeholder="搜索地址或数据..." />
    <div class="col-toggle">
      <button class="btn-sm btn-outline" id="colToggleBtn">列显隐</button>
      <div class="col-menu" id="colMenu"></div>
    </div>
  </div>

  <div class="table-wrap">
    <table id="tbl">
      <thead>
        <tr>
          <th data-col="0" data-key="idx" title="点击恢复输入顺序"># <span class="sort-hint">↺</span></th>
          <th data-col="1" data-key="addr">地址 <span class="sort-hint">⇅</span></th>
          <th data-col="2" data-key="vol" title="点击排序">交易额 <span class="sort-hint">⇅</span></th>
          <th data-col="3" data-key="cnt" title="点击排序">池子数 <span class="sort-hint">⇅</span></th>
          <th data-col="4" data-key="pro" title="点击排序">盈亏 <span class="sort-hint">⇅</span></th>
          <th data-col="5" data-key="avail" title="点击排序">可用 <span class="sort-hint">⇅</span></th>
          <th data-col="6" data-key="hold" title="点击排序">持仓 <span class="sort-hint">⇅</span></th>
          <th data-col="7" data-key="total" title="点击排序">总余额 <span class="sort-hint">⇅</span></th>
          <th data-col="8" data-key="days" title="点击排序">日活 <span class="sort-hint">⇅</span></th>
          <th data-col="9" data-key="months" title="点击排序">月活 <span class="sort-hint">⇅</span></th>
          <th data-col="10" data-key="last" title="点击排序">最后活跃 <span class="sort-hint">⇅</span></th>
          <th data-col="11" data-key="note">备注</th>
          <th data-col="12" data-key="refresh">操作</th>
        </tr>
      </thead>
      <tbody></tbody>
      <tfoot id="tfoot" style="display:none">
        <tr id="tfootRow"></tr>
      </tfoot>
    </table>
  </div>
</div>

<p class="footer">© 2025 Polymarket Toolbox · Made by <a href="https://x.com/0xXIAOc" target="_blank">@0xXIAOc</a></p>
<div id="toast" class="toast"></div>

<script>
const FETCH_TIMEOUT   = 5000;
const RPC_TIMEOUT     = 3500;
const RETRY_BASE_MS   = 800;
const MAX_SAFES       = 5;
const MS_PER_DAY      = 86400000;
const USDC_DECIMALS   = 6;
const USDC_SCALE      = 10n ** BigInt(USDC_DECIMALS);
const USDC_CONTRACT   = '0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174';
const ETH_ADDR_RE     = /^0x[0-9a-fA-F]{40}$/;
const CONCURRENCY     = 3;
const RATE_LIMIT_MS   = 200;
const HISTORY_KEY     = 'pm_query_history';
const MAX_HISTORY     = 20;

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function toNum(n) {
  const v = Number(n);
  return Number.isFinite(v) ? v : NaN;
}

const fmtInt = n => {
  const v = toNum(n);
  return isNaN(v) ? '-' : Math.round(v).toLocaleString('en-US');
};

const fmtDec = n => {
  const v = toNum(n);
  if (isNaN(v)) return '-';
  return v.toLocaleString('en-US', { minimumFractionDigits: v % 1 ? 2 : 0 });
};

const clip = a => a.length > 12 ? `${a.slice(0, 6)}...${a.slice(-4)}` : a;

function toast(t) {
  const el = $('#toast');
  el.textContent = t;
  el.style.opacity = 1;
  setTimeout(() => el.style.opacity = 0, 1500);
}

function copy(addr) {
  navigator.clipboard.writeText(addr).then(() => toast('已复制'));
}

function isValidAddr(addr) {
  return ETH_ADDR_RE.test(addr);
}

let rateLimitQueue = Promise.resolve();
function rateLimitWait() {
  rateLimitQueue = rateLimitQueue.then(() =>
    new Promise(r => setTimeout(r, RATE_LIMIT_MS))
  );
  return rateLimitQueue;
}

const queryCache = new Map();

let abortFlag = false;
let runController = null;

function fetchT(url, opts = {}, timeout = FETCH_TIMEOUT) {
  const c = new AbortController();
  const tid = setTimeout(() => c.abort(), timeout);
  const signal = runController
    ? AbortSignal.any([c.signal, runController.signal])
    : c.signal;
  return fetch(url, { ...opts, signal }).finally(() => clearTimeout(tid));
}

async function fetchJ(url, opts = {}, tries = 2) {
  await rateLimitWait();
  for (let i = 0; i < tries; i++) {
    try {
      const r = await fetchT(url, opts);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    } catch (e) {
      if (i === tries - 1) throw e;
      await new Promise(res => setTimeout(res, RETRY_BASE_MS * (i + 1)));
    }
  }
}

const POLYGON_RPCS = [
  "https://polygon.drpc.org",
  "https://polygon.publicnode.com",
  "https://polygon-bor-rpc.publicnode.com",
  "https://1rpc.io/matic",
  "https://tenderly.rpc.polygon.community",
  "https://rpc.ankr.com/polygon",
];

let preferredPolygonRpc = POLYGON_RPCS[0];

async function rpcEthCall(payload, timeout = RPC_TIMEOUT) {
  const urls = [preferredPolygonRpc, ...POLYGON_RPCS.filter(u => u !== preferredPolygonRpc)];
  for (const url of urls) {
    try {
      const res = await fetchT(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      }, timeout);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const j = await res.json();
      const result = Array.isArray(j) ? j[0]?.result : j?.result;
      if (typeof result === 'string' && result.startsWith('0x')) {
        preferredPolygonRpc = url;
        return result;
      }
    } catch (_) {}
  }
  return null;
}

async function getUSDC(addr) {
  const data = '0x70a08231000000000000000000000000' + addr.slice(2);
  const payload = {
    jsonrpc: '2.0', id: 1, method: 'eth_call',
    params: [{ to: USDC_CONTRACT, data }, 'latest']
  };
  try {
    const hex = await rpcEthCall(payload, 4000);
    if (!hex) return '-';
    const raw = hex === '0x' ? 0n : BigInt(hex);
    const valueTimes100 = (raw * 100n + USDC_SCALE / 2n) / USDC_SCALE;
    const whole = valueTimes100 / 100n;
    const cent  = valueTimes100 % 100n;
    return `${whole}.${cent.toString().padStart(2, '0')}`;
  } catch (_) {
    return '-';
  }
}

const api = {
  volume: a => fetchJ(`https://lb-api.polymarket.com/volume?window=all&limit=1&address=${a}`)
    .then(d => d[0]?.amount ?? '-'),
  traded: a => fetchJ(`https://data-api.polymarket.com/traded?user=${a}`)
    .then(d => d.traded ?? '-'),
  profit: a => fetchJ(`https://lb-api.polymarket.com/profit?window=all&limit=1&address=${a}`)
    .then(d => d[0]?.amount ?? '-'),
  usdc: getUSDC,
  value: a => fetchJ(`https://data-api.polymarket.com/value?user=${a}`)
    .then(d => d[0]?.value ?? '-'),
  activity: async a => {
    try {
      const d = await fetchJ(`https://data-api.polymarket.com/activity?user=${a}&limit=999&offset=0`);
      if (!d.length) return { d: 0, m: 0, last: '-', thisMonth: false };
      d.sort((x, y) => y.timestamp - x.timestamp);
      const days = new Set(), months = new Set();
      for (const item of d) {
        const ts = item.timestamp * 1000;
        const date = new Date(ts);
        const y = date.getFullYear(), mo = date.getMonth() + 1, day = date.getDate();
        days.add(y * 10000 + mo * 100 + day);
        months.add(y * 100 + mo);
      }
      const latest = new Date(d[0].timestamp * 1000);
      const now = new Date();
      const thisMonth = latest.getFullYear() === now.getFullYear() && latest.getMonth() === now.getMonth();
      const gap = Math.floor((Date.now() - latest.getTime()) / MS_PER_DAY);
      return { d: days.size, m: months.size, last: gap ? `${gap}天前` : '今天', thisMonth };
    } catch (_) {
      return { d: 0, m: 0, last: '-', thisMonth: false };
    }
  }
};

async function queryOne(owner) {
  if (queryCache.has(owner)) return queryCache.get(owner);

  let safes = [];
  try {
    const url = `https://safe-client.safe.global/v1/chains/137/owners/${owner}/safes`;
    const res = await fetchJ(url).catch(() => ({ safes: [] }));
    safes = Array.isArray(res?.safes) ? res.safes
          : Array.isArray(res) ? res
          : Array.isArray(res?.['137']) ? res['137']
          : Array.isArray(res?.safes?.['137']) ? res.safes['137']
          : [];
    safes = safes.slice(0, MAX_SAFES);
  } catch (_) {}

  if (!safes.length) {
    const result = [{ disp: owner, err: '无数据' }];
    queryCache.set(owner, result);
    return result;
  }

  const rows = [];
  for (const safe of safes) {
    if (abortFlag) break;
    try {
      const [vol, cnt, pro, hold, act, avail] = await Promise.all([
        api.volume(safe), api.traded(safe), api.profit(safe),
        api.value(safe),  api.activity(safe), api.usdc(safe)
      ]);
      rows.push({ disp: owner, safe, vol, cnt, pro, avail, hold, act });
    } catch (_) {
      rows.push({ disp: owner, err: '子查询失败' });
    }
  }
  queryCache.set(owner, rows);
  return rows;
}

async function runPool(tasks, concurrency, onDone) {
  let i = 0;
  async function worker() {
    while (i < tasks.length && !abortFlag) {
      const idx = i++;
      const result = await tasks[idx]();
      onDone(result, idx);
    }
  }
  const workers = Array.from({ length: Math.min(concurrency, tasks.length) }, () => worker());
  await Promise.all(workers);
}

let resultRows = [];
let resultMeta = [];
const CSV_HEADERS = ['#', '地址', '交易额', '池子数', '盈亏', '可用', '持仓', '总余额', '日活', '月活', '最后活跃', '备注'];

function initTheme() {
  const saved = localStorage.getItem('pm_theme');
  if (saved === 'dark' || (!saved && matchMedia('(prefers-color-scheme:dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
    $('#themeBtn').textContent = '☀️';
  }
}
$('#themeBtn').addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    $('#themeBtn').textContent = '🌙';
    localStorage.setItem('pm_theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    $('#themeBtn').textContent = '☀️';
    localStorage.setItem('pm_theme', 'dark');
  }
});
initTheme();

function updateOnlineStatus() {
  $('#offlineBanner').style.display = navigator.onLine ? 'none' : 'block';
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

const inputEl = $('#input');
inputEl.addEventListener('dragover', e => { e.preventDefault(); inputEl.classList.add('drag-over'); });
inputEl.addEventListener('dragleave', () => inputEl.classList.remove('drag-over'));
inputEl.addEventListener('drop', e => {
  e.preventDefault();
  inputEl.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && /\.(csv|txt)$/i.test(file.name)) {
    const reader = new FileReader();
    reader.onload = () => {
      const text = reader.result;
      const addrs = text.match(/0x[0-9a-fA-F]{40}/g);
      if (addrs?.length) {
        inputEl.value = [...new Set(addrs)].join('\n');
        toast(`已导入 ${new Set(addrs).size} 个地址`);
      } else {
        toast('文件中未找到有效地址');
      }
    };
    reader.readAsText(file);
  } else {
    toast('仅支持 CSV 或 TXT 文件');
  }
});

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}

const NOTE_KEY = 'pm_notes';
function getNotes() { try { return JSON.parse(localStorage.getItem(NOTE_KEY)) || {}; } catch { return {}; } }
function saveNote(addr, text) {
  const notes = getNotes();
  if (text) notes[addr.toLowerCase()] = text; else delete notes[addr.toLowerCase()];
  localStorage.setItem(NOTE_KEY, JSON.stringify(notes));
}
function getNote(addr) { return getNotes()[addr.toLowerCase()] || ''; }

function saveHistory(addrs) {
  const list = getHistory();
  const entry = { addrs: addrs.slice(0, 50), time: Date.now(), count: addrs.length };
  list.unshift(entry);
  if (list.length > MAX_HISTORY) list.length = MAX_HISTORY;
  localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  renderHistory();
}
function renderHistory() {
  const list = getHistory();
  const wrap = $('#historyWrap');
  const el = $('#historyList');
  if (!list.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  el.innerHTML = '';
  list.forEach((h, i) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    const dt = new Date(h.time);
    const timeStr = `${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`;
    const span = document.createElement('span');
    span.textContent = `${timeStr} — ${h.count} 个地址`;
    span.addEventListener('click', () => {
      inputEl.value = h.addrs.join('\n');
      toast('已加载历史记录');
    });
    const del = document.createElement('button');
    del.textContent = '删';
    del.addEventListener('click', () => {
      const arr = getHistory();
      arr.splice(i, 1);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(arr));
      renderHistory();
    });
    div.appendChild(span);
    div.appendChild(del);
    el.appendChild(div);
  });
}
$('#clearHistory').addEventListener('click', () => {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
  toast('历史已清空');
});
renderHistory();

const COL_NAMES = ['#', '地址', '交易额', '池子数', '盈亏', '可用', '持仓', '总余额', '日活', '月活', '最后活跃', '备注', '操作'];
const hiddenCols = new Set();

function buildColMenu() {
  const menu = $('#colMenu');
  menu.innerHTML = '';
  COL_NAMES.forEach((name, i) => {
    if (i <= 1) return;
    const label = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !hiddenCols.has(i);
    cb.addEventListener('change', () => {
      if (cb.checked) hiddenCols.delete(i); else hiddenCols.add(i);
      applyColVisibility();
    });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(' ' + name));
    menu.appendChild(label);
  });
}

function applyColVisibility() {
  const allRows = $$('#tbl tr');
  allRows.forEach(tr => {
    const cells = tr.children;
    for (let i = 0; i < cells.length; i++) {
      cells[i].style.display = hiddenCols.has(i) ? 'none' : '';
    }
  });
}

$('#colToggleBtn').addEventListener('click', e => {
  e.stopPropagation();
  $('#colMenu').classList.toggle('show');
});
document.addEventListener('click', () => $('#colMenu').classList.remove('show'));
$('#colMenu').addEventListener('click', e => e.stopPropagation());
buildColMenu();

function applyFilter() {
  const q = $('#filterInput').value.trim().toLowerCase();
  const rows = $$('#tbl tbody tr');

  rows.forEach(tr => {
    const fullAddr = (tr.dataset.fullAddr || '').toLowerCase();
    const text = tr.textContent.toLowerCase();
    tr.style.display = (!q || fullAddr.includes(q) || text.includes(q)) ? '' : 'none';
  });
}

$('#filterInput').addEventListener('input', applyFilter);

let sortKey = null, sortAsc = true;
const sortExtract = {
  idx: row => row.idx,
  addr: row => row.addr,
  vol: row => toNum(row.vol),
  cnt: row => toNum(row.cnt),
  pro: row => toNum(row.pro),
  avail: row => toNum(row.avail),
  hold: row => toNum(row.hold),
  total: row => toNum(row.avail) + toNum(row.hold),
  days: row => row.act?.d ?? 0,
  months: row => row.act?.m ?? 0,
  last: row => row.act?.last === '今天' ? 0 : (parseInt(row.act?.last) || 9999),
  note: row => getNote(row.addr),
};

function resetSortUI() {
  $$('#tbl thead th .sort-arrow').forEach(s => s.textContent = '');
  $$('#tbl thead th .sort-hint').forEach(s => s.style.display = '');
}

$$('#tbl thead th').forEach(th => {
  const key = th.dataset.key;
  if (!key || key === 'refresh' || key === 'note') return;
  if (key === 'idx') {
    th.title = '点击恢复输入顺序';
    th.addEventListener('click', () => {
      sortKey = null; sortAsc = true;
      renderAll();
      resetSortUI();
      toast('已恢复输入顺序');
    });
    return;
  }
  th.addEventListener('click', () => {
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = true; }
    sortAndRender();
    resetSortUI();
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = sortAsc ? '▲' : '▼';
    const hint = th.querySelector('.sort-hint');
    if (hint) hint.style.display = 'none';
  });
  const span = document.createElement('span');
  span.className = 'sort-arrow';
  th.appendChild(span);
});

function getSortedMeta() {
  if (!sortKey) return [...resultMeta].sort((a, b) => a._origIdx - b._origIdx);
  const extractor = sortExtract[sortKey];
  if (!extractor) return [...resultMeta];
  return [...resultMeta].sort((a, b) => {
    if (a.err && !b.err) return 1;
    if (!a.err && b.err) return -1;
    const va = extractor(a), vb = extractor(b);
    if (typeof va === 'string' && typeof vb === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    const na = isNaN(va) ? -Infinity : va;
    const nb = isNaN(vb) ? -Infinity : vb;
    return sortAsc ? na - nb : nb - na;
  });
}

function renderAll() {
  if (!resultMeta.length) return;
  const data = getSortedMeta();
  const tbody = $('#tbl tbody');
  tbody.innerHTML = '';
  resultRows = [];
  data.forEach((m, i) => {
    m.idx = i + 1;
    if (m.err) {
      appendErrDirect(m.err, m.addr, i + 1);
    } else {
      renderRowDirect(m, i + 1);
    }
  });
  updateSummaryStats();
  applyColVisibility();
  applyFilter();
}

function sortAndRender() {
  renderAll();
}

function renderRowDirect(m, idx) {
  const tbody = $('#tbl tbody');
  const p = toNum(m.pro);
  const sign = p < 0 ? '▼' : '▲';
  const cls = p < 0 ? 'negative' : 'positive';
  const total = (toNum(m.avail) + toNum(m.hold)).toFixed(2);
  const lastCls = m.act?.thisMonth ? '' : 'inactive';

  const tr = document.createElement('tr');
  tr.dataset.rowIdx = String(idx - 1);
  tr.dataset.fullAddr = m.addr.toLowerCase();

  tr.innerHTML = `
    <td>${idx}</td>
    <td>${clip(m.addr)}<span class="copy" data-addr>📋</span></td>
    <td>${fmtInt(m.vol)}</td>
    <td>${m.cnt}</td>
    <td class="${cls}">${sign} ${fmtInt(Math.abs(p))}</td>
    <td>${fmtDec(m.avail)}</td>
    <td>${fmtDec(m.hold)}</td>
    <td>${fmtDec(total)}</td>
    <td>${m.act?.d ?? '-'}</td>
    <td>${m.act?.m ?? '-'}</td>
    <td class="${lastCls}">${m.act?.last ?? '-'}</td>
    <td><input class="note-input" data-note placeholder="添加备注" value="${(getNote(m.addr) || '').replace(/"/g, '&quot;')}"></td>
    <td><button class="btn-sm" data-refresh>刷新</button></td>`;

  tr.querySelector('[data-addr]').addEventListener('click', () => copy(m.addr));
  tr.querySelector('[data-refresh]').addEventListener('click', () => refreshRow(m));
  tr.querySelector('[data-note]').addEventListener('change', function() {
    saveNote(m.addr, this.value.trim());
  });

  tbody.appendChild(tr);

  resultRows.push([
    idx, m.addr, fmtInt(m.vol), m.cnt, `${sign} ${fmtInt(Math.abs(p))}`,
    fmtDec(m.avail), fmtDec(m.hold), fmtDec(total),
    m.act?.d ?? 0, m.act?.m ?? 0, m.act?.last ?? '-', getNote(m.addr)
  ]);
}

function appendErrDirect(msg, addr, idx) {
  const tbody = $('#tbl tbody');
  const tr = document.createElement('tr');
  tr.dataset.fullAddr = addr.toLowerCase();
  tr.innerHTML = `<td>${idx}</td><td>${clip(addr)}</td><td colspan="11" class="negative">${msg}</td>`;
  tbody.appendChild(tr);
  resultRows.push([idx, addr, msg]);
}

async function refreshRow(meta) {
  queryCache.delete(meta.addr);
  toast('正在刷新...');
  try {
    const rows = await queryOne(meta.addr);
    const match = rows.find(r => r.safe === meta.safe);
    if (match && !match.err) {
      Object.assign(meta, { vol: match.vol, cnt: match.cnt, pro: match.pro, avail: match.avail, hold: match.hold, act: match.act });
      renderAll();
      toast('刷新完成');
    } else {
      toast('刷新失败');
    }
  } catch {
    toast('刷新失败');
  }
}

function updateSummaryStats() {
  const tfoot = $('#tfoot');
  const tfootRow = $('#tfootRow');
  const cards = $('#statsCards');

  if (!resultMeta.length || resultMeta.every(m => m.err)) {
    tfoot.style.display = 'none';
    cards.style.display = 'none';
    return;
  }

  const valid = resultMeta.filter(m => !m.err);
  const sumVol = valid.reduce((s, m) => s + (toNum(m.vol) || 0), 0);
  const sumPro = valid.reduce((s, m) => s + (toNum(m.pro) || 0), 0);
  const sumAvail = valid.reduce((s, m) => s + (toNum(m.avail) || 0), 0);
  const sumHold = valid.reduce((s, m) => s + (toNum(m.hold) || 0), 0);
  const sumTotal = sumAvail + sumHold;
  const avgDays = valid.length ? (valid.reduce((s, m) => s + (m.act?.d || 0), 0) / valid.length).toFixed(1) : '-';
  const avgMonths = valid.length ? (valid.reduce((s, m) => s + (m.act?.m || 0), 0) / valid.length).toFixed(1) : '-';

  const proSign = sumPro < 0 ? '▼' : '▲';
  const proCls = sumPro < 0 ? 'negative' : 'positive';

  const profitEl = $('#statProfit');
  profitEl.textContent = `${proSign} $${fmtDec(Math.abs(sumPro))}`;
  profitEl.className = `stat-value ${proCls}`;

  $('#statAvail').textContent = `$${fmtDec(sumAvail)}`;
  $('#statHold').textContent = `$${fmtDec(sumHold)}`;
  $('#statTotal').textContent = `$${fmtDec(sumTotal)}`;
  cards.style.display = 'grid';

  tfootRow.innerHTML = `
    <td>汇总</td><td>${valid.length} 行</td>
    <td>${fmtInt(sumVol)}</td><td>-</td>
    <td class="${proCls}">${proSign} ${fmtInt(Math.abs(sumPro))}</td>
    <td>${fmtDec(sumAvail)}</td><td>${fmtDec(sumHold)}</td><td>${fmtDec(sumTotal)}</td>
    <td>${avgDays}</td><td>${avgMonths}</td><td>-</td><td>-</td><td>-</td>`;

  tfoot.style.display = '';
  applyColVisibility();
}

$('#run').addEventListener('click', async () => {
  const raw = $('#input').value.trim().split('\n').map(s => s.trim()).filter(Boolean);
  if (!raw.length) return toast('请输入地址');

  const invalid = raw.filter(a => !isValidAddr(a));
  if (invalid.length) return toast(`${invalid.length} 个地址格式无效，请检查`);

  const unique = [...new Set(raw)];
  if (unique.length < raw.length) {
    toast(`已自动去除 ${raw.length - unique.length} 个重复地址`);
  }
  const list = unique;

  saveHistory(list);

  const tbody = $('#tbl tbody');
  tbody.innerHTML = '';
  resultRows = [];
  resultMeta = [];
  abortFlag = false;
  runController = new AbortController();

  $('#summary').style.display = 'none';
  $('#statsCards').style.display = 'none';
  $('#loading').style.display = 'block';
  $('#filterRow').style.display = 'flex';
  $('#filterInput').value = '';
  $('#bar').value = 0;
  $('#barTxt').textContent = '';
  $('#run').disabled = $('#csv').disabled = $('#json').disabled = true;
  $('#stop').style.display = '';
  $('#stop').disabled = false;
  $('#stop').textContent = '停止';
  $('#tfoot').style.display = 'none';

  let completed = 0, fail = 0, idx = 1;

  const tasks = list.map(owner => () => queryOne(owner));

  await runPool(tasks, CONCURRENCY, (rows) => {
    completed++;
    $('#bar').value = (completed / list.length) * 100;
    $('#barTxt').textContent = `${completed}/${list.length}`;

    for (const row of rows) {
      if (row.err) {
        const meta = { _origIdx: idx, idx, addr: row.disp, err: row.err };
        resultMeta.push(meta);
        appendErrDirect(row.err, row.disp, idx);
        idx++; fail++;
      } else {
        const meta = { _origIdx: idx, idx, addr: row.disp, safe: row.safe, vol: row.vol, cnt: row.cnt, pro: row.pro, avail: row.avail, hold: row.hold, act: row.act };
        resultMeta.push(meta);
        renderRowDirect(meta, idx);
        idx++;
      }
    }
    applyColVisibility();
  });

  $('#loading').style.display = 'none';
  $('#stop').style.display = 'none';
  $('#run').disabled = $('#csv').disabled = $('#json').disabled = false;

  const status = abortFlag ? '（已中断）' : '';
  const failTxt = fail ? `，其中 ${fail} 个地址暂无数据` : '';
  $('#summary').textContent = `共查询 ${list.length} 个输入地址，生成 ${idx - 1} 行数据${failTxt}${status}`;
  $('#summary').style.display = 'block';

  updateSummaryStats();
});

$('#stop').addEventListener('click', () => {
  abortFlag = true;
  if (runController) runController.abort();
  $('#stop').disabled = true;
  $('#stop').textContent = '正在停止...';
  toast('正在取消所有进行中的请求...');
});

$('#csv').addEventListener('click', () => {
  if (!resultRows.length) return toast('暂无数据');
  const escapeCsv = v => {
    const s = String(v);
    return /[,"\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const lines = [CSV_HEADERS.map(escapeCsv).join(',')];
  for (const row of resultRows) lines.push(row.map(escapeCsv).join(','));
  const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `polymarket_${Date.now()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

$('#json').addEventListener('click', () => {
  if (!resultMeta.length) return toast('暂无数据');
  const data = resultMeta.filter(m => !m.err).map(m => ({
    address: m.addr,
    safe: m.safe,
    volume: toNum(m.vol),
    pools: toNum(m.cnt),
    profit: toNum(m.pro),
    available: toNum(m.avail),
    holdings: toNum(m.hold),
    total: toNum(m.avail) + toNum(m.hold),
    activeDays: m.act?.d ?? 0,
    activeMonths: m.act?.m ?? 0,
    lastActive: m.act?.last ?? '-',
    activeThisMonth: m.act?.thisMonth ?? false,
    note: getNote(m.addr),
  }));
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `polymarket_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
